<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundMaster Ultra</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; padding: 10px; }
        .container { width: 100%; max-width: 500px; margin: auto; }
        header { position: sticky; top: 0; background: #0d1117; padding: 10px 0; z-index: 100; }
        h1 { color: #58a6ff; font-size: 1.5rem; text-align: center; margin: 10px 0; }
        
        .search-container { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #161b22; color: white; outline: none; }
        #btnBuscar { background: #238636; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }

        .tabs { display: flex; border-bottom: 1px solid #30363d; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: #8b949e; }
        .tab.active { color: #58a6ff; border-bottom: 2px solid #58a6ff; font-weight: bold; }

        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .info h3 { margin: 0; font-size: 14px; color: #f0f6fc; max-width: 200px; }
        .info p { margin: 3px 0; font-size: 11px; color: #8b949e; }

        .actions { display: flex; gap: 10px; margin-top: 10px; justify-content: flex-end; }
        .btn-action { border: none; border-radius: 6px; padding: 8px 12px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .play { background: #58a6ff; color: #0d1117; font-weight: bold; }
        .fav { background: #30363d; color: #e3b341; }
        .fav.is-fav { background: #e3b341; color: #0d1117; }
        .download { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }

        #lista-sonidos { min-height: 300px; }
        .status { text-align: center; margin-top: 50px; color: #8b949e; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🔊 SoundMaster Ultra</h1>
        <div class="search-container">
            <input type="text" id="buscador" placeholder="Buscar: risas, motor, lluvia...">
            <button id="btnBuscar">BUSCAR</button>
        </div>
        <div class="tabs">
            <div class="tab active" id="tabExplorar">Explorar</div>
            <div class="tab" id="tabFavoritos">Favoritos ⭐</div>
        </div>
    </header>

    <main id="lista-sonidos">
        <div class="status">Busca algo para empezar...</div>
    </main>
</div>

<audio id="globalPlayer" crossorigin="anonymous"></audio>

<script>
    const API_KEY = 'YFByugODV8MeAK89o3eIdo21XVHbXygM5gNP2u7Z';
    const player = document.getElementById('globalPlayer');
    const contenedor = document.getElementById('lista-sonidos');
    const buscador = document.getElementById('buscador');
    
    let resultadosActuales = [];
    let favoritos = JSON.parse(localStorage.getItem('misFavoritos')) || [];
    let vistaActual = 'explorar'; // o 'favoritos'

    // --- LÓGICA DE BÚSQUEDA ---
    async function buscarSonidos() {
        const query = buscador.value.trim();
        if (!query) return;
        cambiarVista('explorar');
        contenedor.innerHTML = '<div class="status">Buscando en la nube...</div>';

        try {
            const response = await fetch(`https://freesound.org/apiv2/search/text/?query=${query}&token=${API_KEY}&fields=id,name,username,previews,duration&page_size=30`);
            const data = await response.json();
            resultadosActuales = data.results;
            renderizar(resultadosActuales);
        } catch (e) {
            contenedor.innerHTML = '<div class="status">Error de conexión.</div>';
        }
    }

    // --- RENDERIZADO DE CARTAS ---
    function renderizar(sonidos) {
        contenedor.innerHTML = '';
        if (!sonidos || sonidos.length === 0) {
            contenedor.innerHTML = '<div class="status">No hay nada aquí.</div>';
            return;
        }

        sonidos.forEach(s => {
            const audioUrl = s.previews['preview-hq-mp3'].replace('http://', 'https://');
            const esFav = favoritos.some(f => f.id === s.id);
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="info">
                        <h3>${s.name}</h3>
                        <p>${Math.round(s.duration)}s • @${s.username}</p>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn-action download" onclick="descargar('${audioUrl}', '${s.name}')">💾</button>
                    <button class="btn-action fav ${esFav ? 'is-fav' : ''}" onclick="toggleFav('${s.id}')">⭐</button>
                    <button class="btn-action play" onclick="reproducir('${audioUrl}')">▶ SONAR</button>
                </div>
            `;
            contenedor.appendChild(card);
        });
    }

    // --- FUNCIONES DE ACCIÓN ---
    function reproducir(url) {
        player.pause();
        player.src = url;
        player.play().catch(() => alert("Toca de nuevo para reproducir"));
    }

    function toggleFav(id) {
        const sonido = vistaActual === 'explorar' 
            ? resultadosActuales.find(s => s.id == id) 
            : favoritos.find(s => s.id == id);

        const index = favoritos.findIndex(f => f.id == id);
        if (index > -1) {
            favoritos.splice(index, 1);
        } else {
            favoritos.push(sonido);
        }
        localStorage.setItem('misFavoritos', JSON.stringify(favoritos));
        
        if (vistaActual === 'favoritos') {
            renderizar(favoritos);
        } else {
            renderizar(resultadosActuales);
        }
    }

    function descargar(url, nombre) {
        const a = document.createElement('a');
        a.href = url;
        a.download = nombre + ".mp3";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    // --- GESTIÓN DE PESTAÑAS ---
    function cambiarVista(vista) {
        vistaActual = vista;
        document.getElementById('tabExplorar').classList.toggle('active', vista === 'explorar');
        document.getElementById('tabFavoritos').classList.toggle('active', vista === 'favoritos');
        if (vista === 'favoritos') renderizar(favoritos);
    }

    document.getElementById('tabExplorar').onclick = () => cambiarVista('explorar');
    document.getElementById('tabFavoritos').onclick = () => cambiarVista('favoritos');
    document.getElementById('btnBuscar').onclick = buscarSonidos;
    buscador.onkeypress = (e) => { if (e.key === 'Enter') buscarSonidos(); };
</script>
</body>
</html>
