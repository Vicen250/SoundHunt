<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundMaster Pro Fix</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; text-align: center; }
        .container { width: 100%; max-width: 450px; margin: auto; }
        .search-container { display: flex; gap: 8px; margin: 20px 0; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #161b22; color: white; outline: none; }
        #btnBuscar { background: #238636; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #lista-sonidos { width: 100%; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .info { text-align: left; }
        .info h3 { margin: 0; font-size: 14px; color: #58a6ff; }
        
        .play-btn { background: #58a6ff; border: none; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .play-btn svg { fill: #0d1117; width: 24px; height: 24px; }
        .status { margin-top: 20px; color: #8b949e; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔊 SoundMaster</h1>
        <div class="search-container">
            <input type="text" id="buscador" placeholder="Busca: laser, thunder, cat...">
            <button id="btnBuscar">BUSCAR</button>
        </div>
        <div id="lista-sonidos"></div>
    </div>

    <script>
        const API_KEY = 'YFByugODV8MeAK89o3eIdo21XVHbXygM5gNP2u7Z';
        const contenedor = document.getElementById('lista-sonidos');
        const buscador = document.getElementById('buscador');
        let audioActual = null;

        // PRE-CARGA: Crear un objeto de audio global para "despertar" el motor de sonido en Android
        const motorAudio = new Audio();

        async function buscarSonidos() {
            const query = buscador.value.trim();
            if (!query) return;
            contenedor.innerHTML = '<div class="status">Buscando...</div>';

            // Aumentado a 50 resultados
            const url = `https://freesound.org/apiv2/search/text/?query=${query}&token=${API_KEY}&fields=name,username,previews,duration&page_size=50`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                renderizar(data.results);
            } catch (error) {
                contenedor.innerHTML = '<div class="status">Error de conexión.</div>';
            }
        }

        function renderizar(sonidos) {
            contenedor.innerHTML = '';
            if (sonidos.length === 0) {
                contenedor.innerHTML = '<div class="status">No hay resultados.</div>';
                return;
            }
            sonidos.forEach(s => {
                const audioUrl = s.previews['preview-hq-mp3'].replace('http://', 'https://');
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="info">
                        <h3>${s.name}</h3>
                        <p>${Math.round(s.duration)}s • @${s.username}</p>
                    </div>
                    <button class="play-btn" data-url="${audioUrl}">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                `;
                contenedor.appendChild(card);
            });

            // Asignar eventos de click después de renderizar
            document.querySelectorAll('.play-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    reproducir(this.getAttribute('data-url'));
                });
            });
        }

        function reproducir(url) {
            // Detener cualquier audio previo
            if (audioActual) {
                audioActual.pause();
                audioActual.src = "";
                audioActual.load();
            }

            // Crear nueva instancia de audio
            audioActual = new Audio();
            audioActual.crossOrigin = "anonymous"; // Evita bloqueos de CORS
            audioActual.src = url;
            
            // Intentar reproducir con una promesa para capturar errores
            audioActual.play().then(() => {
                console.log("Reproduciendo...");
            }).catch(e => {
                console.error("Error de reproducción:", e);
                alert("Pulsa de nuevo para confirmar la reproducción.");
            });
        }

        document.getElementById('btnBuscar').onclick = buscarSonidos;
        buscador.onkeypress = (e) => { if (e.key === 'Enter') buscarSonidos(); };
    </script>
</body>
</html>
