<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundMaster App</title>
    <style>
        /* Diseño Moderno y Oscuro */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #0d1117; 
            color: #c9d1d9; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { width: 100%; max-width: 450px; }
        header { 
            position: sticky; 
            top: 0; 
            background: #0d1117; 
            padding: 10px 0 20px 0; 
            z-index: 10; 
            text-align: center;
        }
        h1 { color: #58a6ff; font-size: 1.8rem; margin: 0 0 15px 0; }
        
        /* Buscador */
        .search-container { display: flex; gap: 8px; }
        input { 
            flex: 1; 
            padding: 12px 15px; 
            border-radius: 8px; 
            border: 1px solid #30363d; 
            background: #161b22; 
            color: white; 
            font-size: 16px; 
            outline: none;
        }
        input:focus { border-color: #58a6ff; }
        #btnBuscar { 
            background: #238636; 
            color: white; 
            border: none; 
            padding: 0 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
        }

        /* Lista de Resultados */
        #lista-sonidos { margin-top: 20px; width: 100%; }
        .card { 
            background: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 10px; 
            padding: 15px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .info { flex: 1; margin-right: 10px; }
        .info h3 { margin: 0; font-size: 15px; color: #f0f6fc; }
        .info p { margin: 5px 0 0; font-size: 12px; color: #8b949e; }

        /* Botón de Play */
        .play-btn { 
            background: #58a6ff; 
            border: none; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
        }
        .play-btn svg { fill: #0d1117; width: 20px; height: 20px; }
        
        .status { text-align: center; margin-top: 40px; color: #8b949e; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🔊 SoundMaster</h1>
            <div class="search-container">
                <input type="text" id="buscador" placeholder="Ej: trueno, gato, explosión...">
                <button id="btnBuscar">BUSCAR</button>
            </div>
        </header>

        <main id="lista-sonidos">
            <div class="status">Busca sonidos para empezar a reproducir</div>
        </main>
    </div>

    <script>
        // CONFIGURACIÓN
        const API_KEY = 'TU_API_KEY_AQUI'; // <--- PEGA AQUÍ TU TOKEN DE FREESOUND
        const contenedor = document.getElementById('lista-sonidos');
        const buscador = document.getElementById('buscador');
        const btnBuscar = document.getElementById('btnBuscar');
        let audioActual = null;

        // Función de búsqueda
        async function buscarSonidos() {
            const query = buscador.value.trim();
            if (!query) return;

            contenedor.innerHTML = '<div class="status">Buscando...</div>';

            const url = `https://freesound.org/apiv2/search/text/?query=${query}&token=${API_KEY}&fields=name,username,previews,duration&page_size=20`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    renderizar(data.results);
                } else {
                    contenedor.innerHTML = '<div class="status">No se encontraron resultados.</div>';
                }
            } catch (error) {
                console.error(error);
                contenedor.innerHTML = '<div class="status">Error de conexión. Verifica tu API Key.</div>';
            }
        }

        // Crear las tarjetas en pantalla
        function renderizar(sonidos) {
            contenedor.innerHTML = '';
            sonidos.forEach(s => {
                // Forzar HTTPS para evitar bloqueos en Android
                const audioUrl = s.previews['preview-hq-mp3'].replace('http://', 'https://');
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="info">
                        <h3>${s.name}</h3>
                        <p>${Math.round(s.duration)}s • @${s.username}</p>
                    </div>
                    <button class="play-btn" onclick="reproducir('${audioUrl}')">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                `;
                contenedor.appendChild(card);
            });
        }

        // Lógica de reproducción
        function reproducir(url) {
            try {
                if (audioActual) {
                    audioActual.pause();
                    audioActual.currentTime = 0;
                }
                audioActual = new Audio(url);
                audioActual.play().catch(e => {
                    alert("Error: Haz clic de nuevo para reproducir.");
                });
            } catch (err) {
                console.error("Error al reproducir audio:", err);
            }
        }

        // Eventos
        btnBuscar.addEventListener('click', buscarSonidos);
        buscador.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') buscarSonidos();
        });
    </script>
</body>
</html>
