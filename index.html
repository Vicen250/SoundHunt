<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoundMaster Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; padding: 10px; padding-bottom: 80px; }
        .container { width: 100%; max-width: 500px; margin: auto; }
        
        /* Cabecera Fija */
        header { position: sticky; top: 0; background: #0d1117; padding: 10px 0; z-index: 100; border-bottom: 1px solid #30363d; }
        h1 { color: #58a6ff; font-size: 1.4rem; text-align: center; margin: 5px 0; }
        
        .search-container { display: flex; gap: 8px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #161b22; color: white; outline: none; font-size: 16px; }
        #btnBuscar { background: #238636; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }

        .tabs { display: flex; margin-bottom: 10px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: #8b949e; border-bottom: 2px solid transparent; }
        .tab.active { color: #58a6ff; border-bottom: 2px solid #58a6ff; font-weight: bold; }

        /* Tarjetas de Sonido */
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .info h3 { margin: 0; font-size: 15px; color: #f0f6fc; }
        .info p { margin: 5px 0; font-size: 12px; color: #8b949e; }

        .actions { display: flex; gap: 10px; margin-top: 12px; justify-content: flex-end; }
        .btn-action { border: none; border-radius: 8px; padding: 10px 14px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .play { background: #58a6ff; color: #0d1117; flex-grow: 1; font-weight: bold; }
        .fav { background: #30363d; color: #8b949e; }
        .fav.is-fav { color: #e3b341; border: 1px solid #e3b341; }
        .download { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }

        /* Botón de Inicio Flotante */
        #btnHome {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #58a6ff;
            color: #0d1117;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: none;
            z-index: 1000;
            font-size: 24px;
            cursor: pointer;
        }
        #btnHome:active { transform: scale(0.9); }

        .status { text-align: center; margin-top: 60px; color: #8b949e; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🔊 SoundMaster</h1>
        <div class="search-container">
            <input type="text" id="buscador" placeholder="¿Qué quieres escuchar?">
            <button id="btnBuscar">IR</button>
        </div>
        <div class="tabs">
            <div class="tab active" id="tabExplorar">Explorar</div>
            <div class="tab" id="tabFavoritos">Favoritos ⭐</div>
        </div>
    </header>

    <main id="lista-sonidos">
        <div class="status">Bienvenido. Escribe algo arriba para buscar efectos de sonido de alta calidad.</div>
    </main>
</div>

<button id="btnHome" onclick="volverAlInicio()" title="Volver al inicio">🏠</button>

<audio id="globalPlayer" crossorigin="anonymous"></audio>

<script>
    const API_KEY = 'YFByugODV8MeAK89o3eIdo21XVHbXygM5gNP2u7Z';
    const player = document.getElementById('globalPlayer');
    const contenedor = document.getElementById('lista-sonidos');
    const buscador = document.getElementById('buscador');
    
    let resultadosActuales = [];
    let favoritos = JSON.parse(localStorage.getItem('misFavoritos')) || [];
    let vistaActual = 'explorar';

    // --- FUNCIÓN DE INICIO (RESET) ---
    function volverAlInicio() {
        buscador.value = '';
        resultadosActuales = [];
        player.pause();
        player.src = '';
        cambiarVista('explorar');
        contenedor.innerHTML = '<div class="status">App reseteada. Bienvenido de nuevo.</div>';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function buscarSonidos() {
        const query = buscador.value.trim();
        if (!query) return;
        cambiarVista('explorar');
        contenedor.innerHTML = '<div class="status">Buscando...</div>';

        try {
            const response = await fetch(`https://freesound.org/apiv2/search/text/?query=${query}&token=${API_KEY}&fields=id,name,username,previews,duration&page_size=40`);
            const data = await response.json();
            resultadosActuales = data.results;
            renderizar(resultadosActuales);
        } catch (e) {
            contenedor.innerHTML = '<div class="status">Error al conectar. Revisa tu internet.</div>';
        }
    }

    function renderizar(sonidos) {
        contenedor.innerHTML = '';
        if (!sonidos || sonidos.length === 0) {
            contenedor.innerHTML = '<div class="status">No se encontraron sonidos. Intenta con palabras en inglés (ej: rain, car, laugh).</div>';
            return;
        }

        sonidos.forEach(s => {
            const audioUrl = s.previews['preview-hq-mp3'].replace('http://', 'https://');
            const esFav = favoritos.some(f => f.id === s.id);
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="info">
                    <h3>${s.name}</h3>
                    <p>${Math.round(s.duration)}s • @${s.username}</p>
                </div>
                <div class="actions">
                    <button class="btn-action download" onclick="descargar('${audioUrl}', '${s.name}')" title="Descargar">💾</button>
                    <button class="btn-action fav ${esFav ? 'is-fav' : ''}" onclick="toggleFav('${s.id}')" title="Favorito">⭐</button>
                    <button class="btn-action play" onclick="reproducir('${audioUrl}')">▶ REPRODUCIR</button>
                </div>
            `;
            contenedor.appendChild(card);
        });
    }

    function reproducir(url) {
        player.pause();
        player.src = url;
        player.play().catch(() => {
            // Reintento por si el navegador bloquea el primer disparo
            player.play();
        });
    }

    function toggleFav(id) {
        const sonido = vistaActual === 'explorar' 
            ? resultadosActuales.find(s => s.id == id) 
            : favoritos.find(s => s.id == id);

        const index = favoritos.findIndex(f => f.id == id);
        if (index > -1) {
            favoritos.splice(index, 1);
        } else if (sonido) {
            favoritos.push(sonido);
        }
        localStorage.setItem('misFavoritos', JSON.stringify(favoritos));
        renderizar(vistaActual === 'favoritos' ? favoritos : resultadosActuales);
    }

    function descargar(url, nombre) {
        const link = document.createElement('a');
        link.href = url;
        link.target = '_blank'; // Abre en nueva pestaña para forzar descarga en Android
        link.download = nombre + ".mp3";
        link.click();
    }

    function cambiarVista(vista) {
        vistaActual = vista;
        document.getElementById('tabExplorar').classList.toggle('active', vista === 'explorar');
        document.getElementById('tabFavoritos').classList.toggle('active', vista === 'favoritos');
        if (vista === 'favoritos') renderizar(favoritos);
    }

    document.getElementById('tabExplorar').onclick = () => cambiarVista('explorar');
    document.getElementById('tabFavoritos').onclick = () => cambiarVista('favoritos');
    document.getElementById('btnBuscar').onclick = buscarSonidos;
    buscador.onkeypress = (e) => { if (e.key === 'Enter') buscarSonidos(); };
</script>
</body>
</html>
