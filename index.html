<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoundMaster Ultimate</title>
    <style>
        :root { --primary: #58a6ff; --bg: #0d1117; --card-bg: #161b22; --border: #30363d; --success: #238636; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; padding: 10px; padding-bottom: 90px; }
        .container { width: 100%; max-width: 500px; margin: auto; }
        
        header { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; border-bottom: 1px solid var(--border); }
        h1 { color: var(--primary); font-size: 1.4rem; text-align: center; margin: 5px 0; }
        
        /* Filtro de Rango Dual */
        .filter-panel { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
        .range-container { position: relative; height: 40px; margin: 15px 0; }
        input[type="range"] { position: absolute; width: 100%; pointer-events: none; -webkit-appearance: none; background: none; }
        input[type="range"]::-webkit-slider-thumb { height: 18px; width: 18px; border-radius: 50%; background: var(--primary); pointer-events: auto; -webkit-appearance: none; cursor: pointer; }
        .track { position: absolute; width: 100%; height: 6px; background: #30363d; top: 50%; transform: translateY(-50%); border-radius: 3px; }
        
        .range-labels { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px; }
        
        .search-container { display: flex; gap: 8px; margin-top: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #0d1117; color: white; }
        #btnBuscar { background: var(--success); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }

        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: #8b949e; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); font-weight: bold; }

        /* Tarjetas */
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        .info h3 { margin: 0; font-size: 14px; color: #f0f6fc; }
        .time-display { font-family: monospace; color: #39ff14; font-size: 11px; margin-top: 5px; display: none; }

        .actions { display: flex; gap: 8px; margin-top: 10px; }
        .btn { border: none; border-radius: 8px; padding: 10px; cursor: pointer; flex: 1; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .play { background: var(--primary); color: #0d1117; }
        .stop { background: #da3633; color: white; display: none; }
        .fav { background: #30363d; color: #8b949e; flex: 0.3; }
        .fav.is-fav { color: #e3b341; border: 1px solid #e3b341; }
        .dl { background: #21262d; flex: 0.3; color: white; }

        #btnHome { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--primary); border-radius: 50%; border: none; font-size: 24px; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🔊 SoundMaster Ultimate</h1>
        <div class="filter-panel">
            <div class="range-labels">
                <span>Min: <b id="lblMin">0</b>s</span>
                <span id="btnPlus" onclick="extender()" style="color:var(--primary); cursor:pointer;">+3600s</span>
                <span>Max: <b id="lblMax">1800</b>s</span>
            </div>
            <div class="range-container">
                <div class="track"></div>
                <input type="range" id="rangeMin" min="0" max="1800" value="0">
                <input type="range" id="rangeMax" min="0" max="1800" value="1800">
            </div>
            <div class="search-container">
                <input type="text" id="buscador" placeholder="Buscar sonido...">
                <button id="btnBuscar">BUSCAR</button>
            </div>
        </div>
        <div class="tabs">
            <div class="tab active" id="tabExplorar">Explorar</div>
            <div class="tab" id="tabFavoritos">Favoritos ⭐</div>
        </div>
    </header>

    <main id="lista-sonidos"></main>
</div>

<button id="btnHome" onclick="location.reload()">🏠</button>
<audio id="globalPlayer" crossorigin="anonymous"></audio>

<script>
    const API_KEY = 'YFByugODV8MeAK89o3eIdo21XVHbXygM5gNP2u7Z';
    const player = document.getElementById('globalPlayer');
    const contenedor = document.getElementById('lista-sonidos');
    const buscador = document.getElementById('buscador');
    const rMin = document.getElementById('rangeMin');
    const rMax = document.getElementById('rangeMax');
    
    let timerInterval;
    let vistaActual = 'explorar';
    let resultadosBusqueda = [];
    let favoritos = JSON.parse(localStorage.getItem('soundFavs')) || [];

    // Lógica Slider Dual
    [rMin, rMax].forEach(input => {
        input.oninput = () => {
            if(parseInt(rMin.value) >= parseInt(rMax.value)) {
                if(input.id === 'rangeMin') rMin.value = rMax.value - 1;
                else rMax.value = parseInt(rMin.value) + 1;
            }
            document.getElementById('lblMin').innerText = rMin.value;
            document.getElementById('lblMax').innerText = rMax.value;
        };
    });

    function extender() {
        rMax.max = rMax.max == "1800" ? "3600" : "1800";
        document.getElementById('btnPlus').innerText = rMax.max == "3600" ? "-1800s" : "+3600s";
    }

    async function buscarSonidos() {
        if (!buscador.value.trim()) return;
        vistaActual = 'explorar';
        document.getElementById('tabExplorar').click();
        contenedor.innerHTML = '<p style="text-align:center">Buscando...</p>';
        
        const url = `https://freesound.org/apiv2/search/text/?query=${buscador.value}&filter=duration:[${rMin.value} TO ${rMax.value}]&token=${API_KEY}&fields=id,name,username,previews,duration&page_size=40`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            resultadosBusqueda = data.results;
            renderizar(resultadosBusqueda);
        } catch (e) { alert("Error de red"); }
    }

    function renderizar(lista) {
        contenedor.innerHTML = lista.length ? '' : '<p style="text-align:center">No hay resultados</p>';
        lista.forEach(s => {
            const audioUrl = s.previews['preview-hq-mp3'].replace('http://', 'https://');
            const esFav = favoritos.some(f => f.id === s.id);
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="info">
                    <h3>${s.name}</h3>
                    <p>${Math.round(s.duration)}s • @${s.username}</p>
                    <div class="time-display" id="time-${s.id}">00:00 / 00:00</div>
                </div>
                <div class="actions">
                    <button class="btn dl" onclick="window.open('${audioUrl}')">💾</button>
                    <button class="btn fav ${esFav ? 'is-fav' : ''}" onclick="toggleFav(${s.id})">⭐</button>
                    <button class="btn play" id="p-${s.id}" onclick="atacar('${audioUrl}', ${s.id})">▶</button>
                    <button class="btn stop" id="s-${s.id}" onclick="parar(${s.id})">⏹ STOP</button>
                </div>`;
            contenedor.appendChild(card);
        });
    }

    function atacar(url, id) {
        pararTodo();
        player.src = url;
        player.play();
        document.getElementById(`p-${id}`).style.display = 'none';
        document.getElementById(`s-${id}`).style.display = 'flex';
        const disp = document.getElementById(`time-${id}`);
        disp.style.display = 'block';
        
        timerInterval = setInterval(() => {
            const cur = format(player.currentTime);
            const tot = format(player.duration || 0);
            disp.innerText = `${cur} / ${tot}`;
            if(player.ended) parar(id);
        }, 400);
    }

    function parar(id) {
        player.pause();
        document.getElementById(`p-${id}`).style.display = 'flex';
        document.getElementById(`s-${id}`).style.display = 'none';
        document.getElementById(`time-${id}`).style.display = 'none';
        clearInterval(timerInterval);
    }

    function pararTodo() {
        document.querySelectorAll('.stop').forEach(b => b.style.display = 'none');
        document.querySelectorAll('.play').forEach(b => b.style.display = 'flex');
        document.querySelectorAll('.time-display').forEach(d => d.style.display = 'none');
        clearInterval(timerInterval);
    }

    function toggleFav(id) {
        const item = vistaActual === 'explorar' ? resultadosBusqueda.find(x => x.id == id) : favoritos.find(x => x.id == id);
        const idx = favoritos.findIndex(x => x.id == id);
        if(idx > -1) favoritos.splice(idx, 1);
        else if(item) favoritos.push(item);
        
        localStorage.setItem('soundFavs', JSON.stringify(favoritos));
        renderizar(vistaActual === 'explorar' ? resultadosBusqueda : favoritos);
    }

    function format(t) {
        const m = Math.floor(t/60), s = Math.floor(t%60);
        return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    document.getElementById('tabExplorar').onclick = () => {
        vistaActual = 'explorar';
        document.getElementById('tabExplorar').classList.add('active');
        document.getElementById('tabFavoritos').classList.remove('active');
        renderizar(resultadosBusqueda);
    };

    document.getElementById('tabFavoritos').onclick = () => {
        vistaActual = 'favoritos';
        document.getElementById('tabFavoritos').classList.add('active');
        document.getElementById('tabExplorar').classList.remove('active');
        renderizar(favoritos);
    };

    document.getElementById('btnBuscar').onclick = buscarSonidos;
    buscador.onkeypress = (e) => e.key === 'Enter' && buscarSonidos();
</script>
</body>
</html>
