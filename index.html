<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundMaster Pro</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0d1117; 
            color: #c9d1d9; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { width: 100%; max-width: 450px; }
        header { 
            position: sticky; 
            top: 0; 
            background: #0d1117; 
            padding: 10px 0 20px 0; 
            z-index: 10; 
            text-align: center;
        }
        h1 { color: #58a6ff; font-size: 1.8rem; margin: 0 0 15px 0; }
        
        .search-container { display: flex; gap: 8px; }
        input { 
            flex: 1; 
            padding: 12px 15px; 
            border-radius: 8px; 
            border: 1px solid #30363d; 
            background: #161b22; 
            color: white; 
            font-size: 16px; 
            outline: none;
        }
        #btnBuscar { 
            background: #238636; 
            color: white; 
            border: none; 
            padding: 0 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
        }

        #lista-sonidos { margin-top: 20px; width: 100%; }
        .card { 
            background: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 10px; 
            padding: 15px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .info h3 { margin: 0; font-size: 14px; color: #f0f6fc; }
        .info p { margin: 5px 0 0; font-size: 11px; color: #8b949e; }

        .play-btn { 
            background: #58a6ff; 
            border: none; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
        }
        .play-btn svg { fill: #0d1117; width: 20px; height: 20px; }
        
        .status { text-align: center; margin-top: 40px; color: #8b949e; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🔊 SoundMaster</h1>
            <div class="search-container">
                <input type="text" id="buscador" placeholder="Busca un sonido (ej: laser)...">
                <button id="btnBuscar">BUSCAR</button>
            </div>
        </header>

        <main id="lista-sonidos">
            <div class="status">Escribe algo para buscar sonidos</div>
        </main>
    </div>

    <script>
        // API KEY YA INTEGRADA
        const API_KEY = 'YFByugODV8MeAK89o3eIdo21XVHbXygM5gNP2u7Z'; 
        const contenedor = document.getElementById('lista-sonidos');
        const buscador = document.getElementById('buscador');
        const btnBuscar = document.getElementById('btnBuscar');
        let audioActual = null;

        async function buscarSonidos() {
            const query = buscador.value.trim();
            if (!query) return;

            contenedor.innerHTML = '<div class="status">Buscando en Freesound...</div>';

            // Llamada a la API
            const url = `https://freesound.org/apiv2/search/text/?query=${query}&token=${API_KEY}&fields=name,username,previews,duration&page_size=15`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    renderizar(data.results);
                } else {
                    contenedor.innerHTML = '<div class="status">No se encontraron sonidos. intenta con otra palabra.</div>';
                }
            } catch (error) {
                contenedor.innerHTML = '<div class="status">Error al conectar con la base de datos.</div>';
            }
        }

        function renderizar(sonidos) {
            contenedor.innerHTML = '';
            sonidos.forEach(s => {
                // Forzamos HTTPS para evitar bloqueos en la APK
                const audioUrl = s.previews['preview-hq-mp3'].replace('http://', 'https://');
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="info">
                        <h3>${s.name}</h3>
                        <p>${Math.round(s.duration)}s • @${s.username}</p>
                    </div>
                    <button class="play-btn" onclick="reproducir('${audioUrl}')">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                `;
                contenedor.appendChild(card);
            });
        }

        function reproducir(url) {
            if (audioActual) {
                audioActual.pause();
                audioActual.currentTime = 0;
            }
            audioActual = new Audio(url);
            audioActual.play().catch(e => console.log("Esperando interacción..."));
        }

        btnBuscar.onclick = buscarSonidos;
        buscador.onkeypress = (e) => { if (e.key === 'Enter') buscarSonidos(); };
    </script>
</body>
</html>
